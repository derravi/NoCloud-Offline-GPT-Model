<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local — offline chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <span class="brand-dot" id="statusDot"></span>
        <span class="brand-name">Local</span>
      </div>
      <button class="new-chat-btn" id="newChatBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>
    </div>

    <div class="conversation-list" id="conversationList">
      <!-- conversations injected here -->
    </div>

    <div class="sidebar-bottom">
      <button class="theme-toggle" id="themeToggle" type="button">
        <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <span id="themeToggleLabel">Dark mode</span>
      </button>
      <div class="status-line" id="ollamaStatus">checking ollama…</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>

      <div class="model-select-wrap">
        <button class="model-select-btn" id="modelSelectBtn">
          <span class="model-select-label" id="modelSelectLabel">select a model</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="model-dropdown" id="modelDropdown"></div>
      </div>

      <div class="conv-title" id="convTitle"></div>
    </header>

    <div class="signal-strip" id="signalStrip"><div class="signal-bar"></div></div>

    <section class="chat-scroll" id="chatScroll">
      <div class="empty-state" id="emptyState">
        <div class="empty-mark">◆</div>
        <h1>Nothing's loaded yet</h1>
        <p>Pick a model from the top bar and start typing. Every reply runs on your own machine — nothing leaves it.</p>
      </div>
      <div class="messages" id="messages"></div>
    </section>

    <form class="composer" id="composerForm">
      <div class="attachment-row" id="attachmentRow"></div>
      <div class="composer-inner">
        <input type="file" id="fileInput" hidden multiple
               accept="image/png,image/jpeg,image/webp,image/gif,.txt,.md,.py,.js,.ts,.jsx,.tsx,.json,.csv,.html,.css,.java,.c,.cpp,.h,.go,.rs,.rb,.php,.sql,.yaml,.yml,.log,.sh" />
        <button type="button" class="attach-btn" id="attachBtn" aria-label="Attach file" title="Attach a file or image">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a5 5 0 01-7.07-7.07l9.19-9.19a3.5 3.5 0 014.95 4.95l-9.2 9.19a1.5 1.5 0 01-2.12-2.12l8.49-8.48"/></svg>
        </button>
        <textarea id="promptInput" placeholder="Message your local model…" rows="1"></textarea>
        <button type="submit" class="send-btn" id="sendBtn" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
      <div class="composer-hint">Enter to send · Shift+Enter for a new line · attach images for vision models, or text/code files for context</div>
    </form>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="app.js"></script>
</body>
</html>
