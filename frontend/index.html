<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local — offline chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <span class="brand-dot" id="statusDot"></span>
        <span class="brand-name">Local</span>
      </div>
      <button class="new-chat-btn" id="newChatBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>
    </div>

    <div class="conversation-list" id="conversationList">
      <!-- conversations injected here -->
    </div>

    <div class="sidebar-bottom">
      <div class="status-line" id="ollamaStatus">checking ollama…</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>

      <div class="model-select-wrap">
        <button class="model-select-btn" id="modelSelectBtn">
          <span class="model-select-label" id="modelSelectLabel">select a model</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="model-dropdown" id="modelDropdown"></div>
      </div>

      <div class="conv-title" id="convTitle"></div>
    </header>

    <div class="signal-strip" id="signalStrip"><div class="signal-bar"></div></div>

    <section class="chat-scroll" id="chatScroll">
      <div class="empty-state" id="emptyState">
        <div class="empty-mark">◆</div>
        <h1>Nothing's loaded yet</h1>
        <p>Pick a model from the top bar and start typing. Every reply runs on your own machine — nothing leaves it.</p>
      </div>
      <div class="messages" id="messages"></div>
    </section>

    <form class="composer" id="composerForm">
      <div class="composer-inner">
        <textarea id="promptInput" placeholder="Message your local model…" rows="1"></textarea>
        <button type="submit" class="send-btn" id="sendBtn" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
      <div class="composer-hint">Enter to send · Shift+Enter for a new line</div>
    </form>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="app.js"></script>
</body>
</html>
